name: tests

# Runs the deterministic tests on every push/PR (unit + orchestration +
# trajectory). The agent eval runs separately: the pr_gate subset on PRs
# (pr-eval.yml) and the full suite weekly / on demand.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest --cov=tools --cov-report=term-missing
